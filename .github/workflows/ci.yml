name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-verify:
    name: API — verify (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install Maven 3.9.9 (CI)
        env:
          MAVEN_VERSION: "3.9.9"
        run: |
          set -euo pipefail
          BASE_URL="https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/${MAVEN_VERSION}"
          curl -fsSL "${BASE_URL}/apache-maven-${MAVEN_VERSION}-bin.tar.gz" -o "/tmp/apache-maven-${MAVEN_VERSION}-bin.tar.gz"
          EXPECTED_SHA=$(curl -fsSL "${BASE_URL}/apache-maven-${MAVEN_VERSION}-bin.tar.gz.sha512" | tr -d '[:space:]')
          ACTUAL_SHA=$(sha512sum "/tmp/apache-maven-${MAVEN_VERSION}-bin.tar.gz" | awk '{print $1}')
          if [ "${EXPECTED_SHA}" != "${ACTUAL_SHA}" ]; then
            echo "SHA512 mismatch for Maven ${MAVEN_VERSION} distribution"
            exit 1
          fi
          tar xzf "/tmp/apache-maven-${MAVEN_VERSION}-bin.tar.gz" -C /tmp
          echo "/tmp/apache-maven-${MAVEN_VERSION}/bin" >> "${GITHUB_PATH}"

      - name: Maven verify (Testcontainers PostgreSQL)
        run: cd apps/api && mvn -B verify

  mobile-quality:
    name: Mobile — lint, typecheck, tests, contrast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: ESLint
        working-directory: apps/mobile
        run: npm run lint

      - name: Typecheck
        working-directory: apps/mobile
        run: npm run typecheck

      - name: Unit tests (Jest + informational coverage summary)
        working-directory: apps/mobile
        run: npm test -- --ci --coverage --coverageReporters=text-summary

      - name: Issue status contrast check
        working-directory: apps/mobile
        run: npm run check:contrast
