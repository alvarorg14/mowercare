databaseChangeLog:
  - changeSet:
      id: "0003-users-credentials-and-role"
      author: mowercare
      dbms: postgresql
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(32)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            constraintName: uq_users_organization_id_email
            tableName: users
            columnNames: organization_id, email
