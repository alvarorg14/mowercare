spring:
  application:
    name: api

  # PostgreSQL (override via environment or .env — see repo root .env.example)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mowercare}
    username: ${SPRING_DATASOURCE_USERNAME:mowercare}
    password: ${SPRING_DATASOURCE_PASSWORD:mowercare}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

mowercare:
  bootstrap:
    token: ${MOWERCARE_BOOTSTRAP_TOKEN:}
  invite:
    token-ttl: ${MOWERCARE_INVITE_TOKEN_TTL:P14D}
  jwt:
    issuer: ${MOWERCARE_JWT_ISSUER:https://api.mowercare.local}
    # Minimum 32 UTF-8 bytes — set MOWERCARE_JWT_SECRET in env (see repo root .env.example)
    secret: ${MOWERCARE_JWT_SECRET:}
    access-token-ttl: ${MOWERCARE_JWT_ACCESS_TTL:PT15M}
    refresh-token-ttl: ${MOWERCARE_JWT_REFRESH_TTL:P7D}
