services:
  postgres:
    image: postgres:16-alpine
    container_name: mowercare-postgres
    environment:
      POSTGRES_DB: mowercare
      POSTGRES_USER: mowercare
      POSTGRES_PASSWORD: mowercare
    ports:
      - "5432:5432"
    volumes:
      - mowercare-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mowercare -d mowercare"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mowercare-postgres-data:
